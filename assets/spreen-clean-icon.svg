<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="spreen-clean: an origami falcon sweeping scattered files off a malachite stone, leaving a polished gleam in its wake">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d6852"/>
      <stop offset="1" stop-color="#1c332a"/>
    </linearGradient>
    <clipPath id="round">
      <circle cx="128" cy="128" r="118"/>
    </clipPath>
  </defs>

  <!-- malachite stone -->
  <circle cx="128" cy="128" r="118" fill="url(#stone)"/>

  <!-- chatoyant band sweeping across the stone -->
  <g clip-path="url(#round)">
    <rect x="-60" y="106" width="440" height="44" fill="#ffffff" opacity="0.08" transform="rotate(45 128 128)"/>
    <rect x="-60" y="122" width="440" height="12" fill="#ffffff" opacity="0.14" transform="rotate(45 128 128)"/>
  </g>

  <!-- the polished gleam left in the falcon's wake: the surface already spreened clean -->
  <g stroke="#d9efe4" stroke-width="4" stroke-linecap="round" opacity="0.75">
    <line x1="52" y1="64" x2="66" y2="64"/>
    <line x1="59" y1="57" x2="59" y2="71"/>
    <line x1="88" y1="36" x2="98" y2="36"/>
    <line x1="93" y1="31" x2="93" y2="41"/>
  </g>

  <!-- scattered files ahead of the sweep, dissolving as the falcon reaches them -->
  <g fill="#c9d8d0">
    <rect x="196" y="140" width="26" height="20" rx="3" transform="rotate(14 209 150)" opacity="0.85"/>
    <rect x="198" y="176" width="24" height="18" rx="3" transform="rotate(-12 210 185)" opacity="0.65"/>
    <rect x="162" y="200" width="22" height="17" rx="3" transform="rotate(22 173 208)" opacity="0.45"/>
  </g>

  <!-- the dust of the files already cleaned away -->
  <g fill="#e8f3ec">
    <circle cx="196" cy="199" r="3" opacity="0.5"/>
    <circle cx="207" cy="167" r="2.5" opacity="0.45"/>
    <circle cx="186" cy="213" r="2" opacity="0.35"/>
    <circle cx="218" cy="152" r="1.5" opacity="0.3"/>
  </g>

  <!-- origami falcon in a sweeping stoop across the stone -->
  <g>
    <!-- trailing wing (far side) -->
    <polygon points="98,122 26,76 90,148" fill="#c3d4da"/>
    <!-- body: the dart of the sweep -->
    <polygon points="190,190 82,90 110,64" fill="#f4f7f8"/>
    <!-- leading wing (near side) -->
    <polygon points="126,94 172,22 152,88" fill="#dde8ec"/>
    <!-- the falcon's eye -->
    <circle cx="170" cy="167" r="6" fill="#f0b429"/>
  </g>

  <!-- polished rim of the stone -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="#9fc2b0" stroke-opacity="0.55" stroke-width="4"/>
</svg>
